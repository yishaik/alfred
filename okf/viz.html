<script>
const DATA={"name": "Alfred (telegram-claude-bridge)", "nodes": [{"id": "architecture/overview", "label": "Alfred \u2014 architecture overview", "type": "Architecture", "description": "Always-on Telegram bot that drives Claude Agent SDK sessions, one per chat/forum-topic, with streaming, permissions, and a secretary.", "body": "# What Alfred is\n\nAlfred drives always-on `claude` sessions from a Telegram bot locked to one chat.\nv2 replaces the raw `claude -p` subprocess with the official **Claude Agent SDK**\n(`claude-agent-sdk`), adding multi-agent management, forum-topic threading,\nbot-to-bot messaging, a secretary/scheduler, voice notes, live streaming output,\nand permission prompts rendered as Telegram buttons.\n\n# Layers\n\n- **Process supervision** \u2014 [supervisor](/components/ops/supervisor.md) runs\n  [bridge.py](/components/main.md) forever with crash-loop backoff and log rotation.\n  See [the process model](/architecture/process-model.md).\n- **Wiring** \u2014 [main](/components/main.md) builds the Telegram app, the\n  [manager](/components/manager.md), the [scheduler](/components/scheduler.md),\n  and the [peer bus](/components/peers.md).\n- **Routing & state** \u2014 [manager](/components/manager.md) is the registry of\n  agents and [sessions](/components/session.md) and routes every inbound message\n  (private chat, forum topic, or bot-to-bot).\n- **Per-route session** \u2014 one [session](/components/session.md) wraps a\n  long-lived Agent SDK client, queues turns, recovers from crashes, and applies\n  [guards](/components/guards.md), [personality](/components/personality/soul.md),\n  and [rate limits](/components/ratelimit.md).\n- **I/O** \u2014 [handlers](/components/handlers.md) take Telegram in;\n  [outbox](/components/outbox.md) + [fmt](/components/fmt.md) push replies out;\n  [voice](/components/voice.md) does STT/TTS; [bridgetools](/components/bridgetools.md)\n  exposes bridge actions to Claude as real MCP tools.\n\n# Key design choices\n\n- **One session per route** \u2014 private chat and each forum topic are independent\n  Claude sessions; `/bind <agent>` picks the config a topic uses.\n- **Tools over text markers** \u2014 Claude calls `mcp__bridge__*` tools; the legacy\n  `\u27e6\u2026\u27e7` [markers](/components/markers.md) remain a fallback.\n- **Permissions as buttons** \u2014 auto-approve by default; `/auto off` makes\n  non-read-only tools tap-to-approve; dangerous commands always need a tap.\n- **Survives restarts** \u2014 queued messages, sessions, jobs, and memory persist\n  under `state/`; a corrupted state file restores from `state/backup/`.\n\n# Citations\n[1] [Project README](/references/readme.md)\n[2] [Claude Agent SDK](/references/claude-agent-sdk.md)"}, {"id": "architecture/process-model", "label": "Process & runtime model", "type": "Runbook", "description": "How the bridge runs \u2014 supervisor, the uv-venv launcher shim, the \"4 python processes is healthy\" rule, single-instance lock, and S4U autostart.", "body": "# Process tree\n\n```\nstart_bridge.bat \u2192 python supervisor.py \u2192 python bridge.py \u2192 claude (Agent SDK)\n```\n\n[supervisor](/components/ops/supervisor.md) restarts [bridge.py](/components/main.md)\nwith exponential backoff (5s\u219260s\u2192300s on fast exits) and rotates `bridge.log`.\n\n# The \"phantom duplicate\" rule\n\nA **single healthy bridge shows up as four python processes**, not one. The\n`.venv\\Scripts\\python.exe` is a ~45 KB uv launcher shim that re-execs the real\nmanaged CPython as a child with the same args (and `sys.executable` reports the\nshim path, so every spawn repeats the trick). So:\n\n- Do **not** count `python \u2026 bridge.py` instances to detect a duplicate.\n- Do **not** kill \"the one whose parent isn't supervisor.py\" \u2014 that is the real bridge.\n- To force a clean restart, run `restart_bridge.ps1` (kills the whole tree + the\n  `start_bridge.bat` loop, relaunches one instance, logs to `restart.log`).\n\n# Single-instance lock\n\nThe bridge binds a loopback port (`BRIDGE_LOCK_PORT`, default 49517). A second\nlauncher that can't bind it refuses to start. The real symptom of a true\nduplicate is a supervisor **crash-looping** with \"another instance is already\nrunning \u2026 Refusing to start\" + `exited rc=1` \u2014 not the process count. The\nTelegram tell is `Conflict: terminated by other getUpdates`.\n\n# Autostart (boot, no login)\n\n`install_autostart.bat` registers a Scheduled Task (`ClaudeTelegramBridge`) that\nruns ~1 min after boot as your account with an **S4U logon** (no stored\npassword), starting [supervisor.py](/components/ops/supervisor.md) on the venv\nPython. It runs as **you** (not SYSTEM) because Claude auth lives in\n`~/.claude/.credentials.json` in your profile. S4U works because that file is\nplain JSON; if a future Claude encrypts it, switch the task to \"Run whether user\nis logged on or not\" with a password.\n\nSee the full [runbook](/operations/runbook.md) for failure recovery.\n\n# Citations\n[1] [Project README \u2014 Runbook](/references/readme.md)"}, {"id": "components/bridgetools", "label": "bridgetools.py \u2014 in-process MCP server", "type": "Module", "description": "Exposes bridge actions to Claude as real MCP tools (send_file, send_buttons, message_agent, schedule, remember/forget/recall).", "body": "# Responsibility\nAn in-process SDK MCP server, one instance per [session](/components/session.md),\nthat turns fragile `\u27e6\u2026\u27e7` [markers](/components/markers.md) into proper tool calls.\n\n# Key behaviors\n- Tools: `mcp__bridge__send_file`, `send_buttons`, `message_agent`,\n  `schedule`/`unschedule`/`list_jobs`, `remember`/`forget`/`recall`.\n- Runs in-process (no subprocess); the legacy markers remain a fallback.\n\n# Collaborators\n[session](/components/session.md) (host) \u00b7 feeds the [scheduler](/components/scheduler.md)\nand [peers](/components/peers.md)."}, {"id": "components/config", "label": "config.py \u2014 settings, secrets, state dirs", "type": "Module", "description": "Environment-based config, secrets, and the persistent STATE_DIR / TMP_DIR, plus disk-space checks.", "body": "# Responsibility\nFoundational settings layer. Loads `BRIDGE_BOT_TOKEN`, `BRIDGE_CHAT_ID`, workdir\nand the many `BRIDGE_*` knobs from env/`.env`; owns `STATE_DIR` and `TMP_DIR`.\n\n# Key behaviors\n- Resolves required secrets (token/chat) and optional tuning vars.\n- Manages `state/` and `state/tmp/` on the project drive (a full `C:` can't break it).\n- Disk-space checks and temp cleanup.\n\n# Collaborators\nFoundational \u2014 imported by nearly everything. See the full\n[config reference](/operations/config-reference.md)."}, {"id": "components/fmt", "label": "fmt.py \u2014 markdown \u2192 Telegram HTML", "type": "Module", "description": "Converts markdown to Telegram HTML, splits long messages under the 4000-char limit, and summarizes tool calls.", "body": "# Responsibility\nPure formatting. Renders Claude's markdown into Telegram-safe HTML and keeps\nmessages within Telegram's limits.\n\n# Key behaviors\n- Renders tables, blockquotes, spoilers, underline.\n- Splits messages respecting the 4000-char cap.\n- Summarizes tool calls for compact display.\n\n# Collaborators\nPure functions. Used by [outbox](/components/outbox.md) and [guards](/components/guards.md)."}, {"id": "components/guards", "label": "guards.py \u2014 tool guardrails & audit", "type": "Module", "description": "PreToolUse/PostToolUse hooks that block dangerous shell commands, audit every tool call, and echo inline diffs.", "body": "# Responsibility\nSafety layer over tool use. Pattern-matches dangerous commands and requires a tap\nbefore they run \u2014 even in auto-approve mode.\n\n# Key behaviors\n- Blocks `rm -rf`, force-push, `format`, registry writes, download-piped-to-shell,\n  `schtasks /create`, `netsh firewall`, \u2026 (extend via `BRIDGE_DANGER_PATTERNS`).\n- Appends every tool call to `state/audit.jsonl` (viewable via `/audit`).\n- PostToolUse: compact unified diff for each Edit/Write (`BRIDGE_SHOW_DIFFS`).\n\n# Collaborators\n[config](/components/config.md) \u00b7 [fmt](/components/fmt.md) \u00b7 [metrics](/components/ops/metrics.md)"}, {"id": "components/handlers", "label": "handlers.py \u2014 Telegram input", "type": "Module", "description": "Telegram handlers for commands, button callbacks, media uploads, and voice transcription; routes messages to sessions.", "body": "# Responsibility\nThe inbound edge. Processes bridge commands, button callbacks, media, and voice,\nand hands turns to the right [session](/components/session.md) via the\n[manager](/components/manager.md).\n\n# Key behaviors\n- Bridge commands: `/panel`, `/status`, `/interrupt`, `/agents`, `/jobs`, `/todo`, \u2026 (see [commands](/operations/commands.md)).\n- Button callbacks (approvals, quick replies, queue control).\n- Media uploads to `<workdir>\\inbox\\`; voice via [voice](/components/voice.md).\n\n# Collaborators\n[manager](/components/manager.md) \u00b7 [config](/components/config.md) \u00b7\n[session](/components/session.md) \u00b7 [voice](/components/voice.md) \u00b7\n[metrics](/components/ops/metrics.md)"}, {"id": "components/main", "label": "main.py \u2014 wiring & entry point", "type": "Module", "description": "Builds the Telegram application, manager, scheduler, and peer bus, and registers all handlers.", "body": "# Responsibility\nTop-level wiring. Sets up logging and the Telegram application, registers\ncommand/callback/media handlers, and starts the long-running services.\n`bridge.py` is a thin shim that calls into this.\n\n# Key behaviors\n- Builds the python-telegram-bot `Application`.\n- Registers [handlers](/components/handlers.md) for commands, callbacks, media.\n- Starts the [manager](/components/manager.md), [scheduler](/components/scheduler.md),\n  and [peer bus](/components/peers.md).\n\n# Collaborators\n[handlers](/components/handlers.md) \u00b7 [config](/components/config.md) \u00b7\n[manager](/components/manager.md) \u00b7 [peers](/components/peers.md) \u00b7\n[scheduler](/components/scheduler.md)"}, {"id": "components/manager", "label": "manager.py \u2014 agents, sessions & routing", "type": "Module", "description": "Registry of agents and sessions; routes every message (private/topic/bot-to-bot) and runs daily health/digest reports.", "body": "# Responsibility\nThe hub. Holds agents, [sessions](/components/session.md), costs, memory, todos,\nand watchers, and routes inbound messages to the right session.\n\n# Key behaviors\n- Routes: private chat, forum topics, bot-to-bot.\n- Drives the [scheduler](/components/scheduler.md), [escalation](/components/ops/escalate.md),\n  [proactive](/components/personality/proactive.md) checks, and memory decay.\n- Emits the daily health/[digest](/components/ops/digest.md) report.\n\n# Collaborators\n[session](/components/session.md) \u00b7 [memory](/components/memory.md) \u00b7\n[todos](/components/mini-apps/todos.md) \u00b7 [expenses](/components/mini-apps/expenses.md) \u00b7\n[contacts](/components/mini-apps/contacts.md) \u00b7 [scheduler](/components/scheduler.md) \u00b7\n[peers](/components/peers.md) \u00b7 [watchers](/components/ops/watchers.md) \u00b7\n[digest](/components/ops/digest.md) \u00b7 [escalate](/components/ops/escalate.md) \u00b7\n[proactive](/components/personality/proactive.md)"}, {"id": "components/markers", "label": "markers.py \u2014 directive parser", "type": "Module", "description": "Parses legacy \u27e6\u2026\u27e7 directives (SEND, TO, REMIND, SCHEDULE, BUTTONS, UNSCHEDULE) from Claude's replies.", "body": "# Responsibility\nPure parser for the structured `\u27e6\u2026\u27e7` text markers Claude can emit \u2014 the fallback\npath now that [bridgetools](/components/bridgetools.md) exposes real MCP tools.\n\n# Key behaviors\n- Parses and strips: `\u27e6SEND:path\u27e7`, `\u27e6TO:agent|msg\u27e7`, `\u27e6REMIND:when|text\u27e7`,\n  `\u27e6SCHEDULE:when|prompt\u27e7`, `\u27e6UNSCHEDULE:id\u27e7`, `\u27e6BUTTONS:a|b\u27e7`.\n- Flexible when-formats for scheduling (consumed by the [scheduler](/components/scheduler.md)).\n\n# Collaborators\nPure parsing. Used by [session](/components/session.md) and [scheduler](/components/scheduler.md)."}, {"id": "components/memory", "label": "memory.py \u2014 long-term agent memory", "type": "Module", "description": "Pinned/note/fact items that survive restarts, are injected into every session, and decay over time.", "body": "# Responsibility\nPer-agent long-term memory, surfaced into every [session](/components/session.md)\nand editable via the `mcp__bridge__remember/forget/recall` [tools](/components/bridgetools.md).\n\n# Key behaviors\n- Item kinds: pinned, note, fact \u2014 persisted across restarts.\n- Decay: old notes collapse to summaries, then drop from injection.\n- Pinned items are exempt from decay.\n\n# Collaborators\nPure logic; persisted by the [manager](/components/manager.md). Complemented by the\n[contacts](/components/mini-apps/contacts.md) book."}, {"id": "components/outbox", "label": "outbox.py \u2014 delivery queue", "type": "Module", "description": "Per-route delivery queue with batching, throttling, streaming-draft edits, and HTML\u2192plain-text fallback.", "body": "# Responsibility\nThe outbound edge. Queues text, files, keyboards, and streaming drafts per route\nand delivers them within Telegram's rate limits.\n\n# Key behaviors\n- Live streaming: one message edited in place as Claude types.\n- Throttles sends (\u22651.05 s apart per chat; draft edits \u22651.5 s).\n- Mutes during `/collect` to gather assistant output.\n- Falls back to plain text if Telegram rejects the HTML (via [fmt](/components/fmt.md)).\n\n# Collaborators\n[fmt](/components/fmt.md)"}, {"id": "components/peers", "label": "peers.py \u2014 bot-to-bot transport", "type": "Module", "description": "Token-authenticated HTTP bus for bridge-to-bridge messages, with hop counters and per-pair rate limits.", "body": "# Responsibility\nA tiny HTTP bus letting one bridge message another (Telegram itself forbids\nbot\u2194bot DMs). Configured via `BRIDGE_PEER_PORT/_TOKEN/_PEERS/_NAME`.\n\n# Key behaviors\n- Binds `127.0.0.1` unless `BRIDGE_PEER_BIND` says otherwise; refuses to listen without a token.\n- Accepts only authenticated POSTs \u226464KB.\n- Hop counters prevent infinite loops; per-pair [rate limits](/components/ratelimit.md) throttle ping-pong.\n\n# Collaborators\n[config](/components/config.md) \u00b7 [ratelimit](/components/ratelimit.md)"}, {"id": "components/ratelimit", "label": "ratelimit.py \u2014 limiter primitives", "type": "Module", "description": "TokenBucket, PairLimiter, and Backoff primitives guarding against bot-to-bot ping-pong and crash loops.", "body": "# Responsibility\nPure rate-limiting primitives used across the bridge. See the tuned defaults in\n[rate limits](/operations/rate-limits.md).\n\n# Key behaviors\n- `TokenBucket` \u2014 generic per-resource throttle.\n- `PairLimiter` \u2014 per (src,dst) agent-pair buckets for bot-to-bot messages.\n- `Backoff` \u2014 exponential crash backoff with fresh-session fallback.\n\n# Collaborators\nUsed by [peers](/components/peers.md), [session](/components/session.md),\n[scheduler](/components/scheduler.md)."}, {"id": "components/scheduler", "label": "scheduler.py \u2014 jobs & reminders", "type": "Module", "description": "Persistent job scheduler for /remind, \u27e6SCHEDULE\u27e7, and recurring tasks, with caps and a recurrence floor.", "body": "# Responsibility\nFires reminders and prompts at scheduled times. Jobs persist in `state/jobs.json`\nand survive restarts.\n\n# Key behaviors\n- Grammar: `15:00`, `+30m`, `daily 09:00`, `weekly mon 09:00`, `weekdays 08:30`,\n  ` until 2026-12-31`.\n- Caps (`BRIDGE_MAX_JOBS`, default 50) and recurrence floor (`BRIDGE_MIN_RECUR_MINUTES`, 15 min).\n- Jobs created in a forum topic fire back into that topic; failed one-shots retry 3\u00d7.\n- Budgets non-human turns to prevent runaway.\n\n# Collaborators\n[config](/components/config.md) \u00b7 [markers](/components/markers.md) \u00b7\n[session](/components/session.md) \u00b7 [metrics](/components/ops/metrics.md)"}, {"id": "components/session", "label": "session.py \u2014 the Claude Agent SDK client", "type": "Module", "description": "One long-lived Agent SDK client per chat/topic; queues turns, recovers from crashes, applies guards, personality, and rate limits.", "body": "# Responsibility\nWraps a long-lived Claude Agent SDK client bound to one Telegram route. The unit\nof conversation: one per private chat or forum topic.\n\n# Key behaviors\n- Queues user turns; the queue survives restarts and is re-fed.\n- Crash recovery via [backoff](/components/ratelimit.md); fresh session after 3 fast crashes.\n- Budgets non-human turns; long-turn watchdog for hangs.\n- Applies [guards](/components/guards.md), [soul](/components/personality/soul.md) +\n  [mood](/components/personality/mood.md), and exposes [bridge tools](/components/bridgetools.md).\n\n# Collaborators\n[bridgetools](/components/bridgetools.md) \u00b7 [guards](/components/guards.md) \u00b7\n[markers](/components/markers.md) \u00b7 [voice](/components/voice.md) \u00b7\n[outbox](/components/outbox.md) \u00b7 [soul](/components/personality/soul.md) \u00b7\n[mood](/components/personality/mood.md) \u00b7 [ratelimit](/components/ratelimit.md)"}, {"id": "components/voice", "label": "voice.py \u2014 speech in & out", "type": "Module", "description": "Voice transcription (OpenAI Whisper / Groq) and TTS replies (OpenAI voice notes or free edge-tts).", "body": "# Responsibility\nSpeech I/O. Transcribes inbound voice notes and, when `/tts on`, speaks replies.\n\n# Key behaviors\n- STT: OpenAI Whisper first, Groq fallback (`OPENAI_API_KEY` / `GROQ_API_KEY`).\n- TTS: OpenAI voice notes (opus) or free `edge-tts` audio.\n- Voices via `BRIDGE_TTS_VOICE` / `BRIDGE_TTS_EDGE_VOICE`.\n\n# Collaborators\n[config](/components/config.md) \u00b7 invoked by [handlers](/components/handlers.md) and [session](/components/session.md)"}, {"id": "components/mini-apps/contacts", "label": "contacts.py \u2014 contact book", "type": "Module", "description": "A lightweight name/info contact book that complements agent memory.", "body": "# Responsibility\nA simple people directory, complementing long-term [memory](/components/memory.md).\nPure logic.\n\n# Key behaviors\n- Name/info pairs.\n- Search by name or info.\n\n# Collaborators\nPersisted by [manager](/components/manager.md); complements [memory](/components/memory.md)."}, {"id": "components/mini-apps/expenses", "label": "expenses.py \u2014 pocket expense tracker", "type": "Module", "description": "A pocket expense ledger (\"amount #category note\") with monthly, per-category summaries.", "body": "# Responsibility\nA lightweight expense tracker. Pure parsing and ledger logic.\n\n# Key behaviors\n- Parses `amount #category note`.\n- Tracks by month; breaks down by category.\n\n# Collaborators\nPersisted by [manager](/components/manager.md). Sibling mini-apps:\n[todos](/components/mini-apps/todos.md), [contacts](/components/mini-apps/contacts.md)."}, {"id": "components/mini-apps/todos", "label": "todos.py \u2014 kanban to-dos", "type": "Module", "description": "A small per-user kanban (todo / doing / done) mini-app.", "body": "# Responsibility\nA curated, single-list-per-user to-do board. Pure logic; the\n[manager](/components/manager.md) persists it.\n\n# Key behaviors\n- Three columns: todo, doing, done.\n- Items move between columns; list kept intentionally small.\n\n# Collaborators\nPersisted by [manager](/components/manager.md). Sibling mini-apps:\n[expenses](/components/mini-apps/expenses.md), [contacts](/components/mini-apps/contacts.md)."}, {"id": "components/ops/digest", "label": "digest.py \u2014 daily digest & health", "type": "Module", "description": "Summarizes the audit trail per agent (tool counts, costs, denials) for the daily health report.", "body": "# Responsibility\nBuilds the daily digest / health report from `state/audit.jsonl`. Pure parsing,\nno LLM calls.\n\n# Key behaviors\n- Per-agent tool categorization and breakdown.\n- Costs, denials, error counters.\n\n# Collaborators\n[config](/components/config.md); reused by the overnight [dream](/components/personality/dream.md) brief."}, {"id": "components/ops/escalate", "label": "escalate.py \u2014 auto-escalation alerts", "type": "Module", "description": "Edge-triggered alerts for low disk, queue backlog, and crash runs (once per condition).", "body": "# Responsibility\nSurfaces operational problems proactively, without spamming.\n\n# Key behaviors\n- Edge-triggered: fires once per condition.\n- Monitors system/project disk, session queue depth, crash rate.\n\n# Collaborators\nPure assessment; driven by the [manager](/components/manager.md)."}, {"id": "components/ops/metrics", "label": "metrics.py \u2014 event counters", "type": "Module", "description": "In-process counters (reset on restart) for /status and the daily health report.", "body": "# Responsibility\nA simple counter map answering \"what went wrong since last restart.\" Long-term\nhistory lives in logs and the audit trail.\n\n# Key behaviors\n- Counts guard denials, TTS failures, dropped sends, scheduler/handler errors.\n- Surfaced in `/status` and the health report.\n\n# Collaborators\nWritten by [guards](/components/guards.md), [scheduler](/components/scheduler.md),\n[handlers](/components/handlers.md); read by [digest](/components/ops/digest.md)."}, {"id": "components/ops/supervisor", "label": "supervisor.py \u2014 crash-loop supervisor", "type": "Module", "description": "Runs bridge.py forever with exponential backoff and rotates bridge.log; no third-party deps.", "body": "# Responsibility\nKeeps the bridge alive. Restarts [bridge.py](/components/main.md) with escalating\ndelays and rotates logs. See [the process model](/architecture/process-model.md).\n\n# Key behaviors\n- Backoff on fast exits: 5s \u2192 60s \u2192 300s.\n- Rotates `bridge.log` at ~10MB.\n- No third-party deps \u2014 runs even with a broken venv.\n\n# Collaborators\n[bridge.py / main](/components/main.md)"}, {"id": "components/ops/transcripts", "label": "transcripts.py \u2014 conversation search", "type": "Module", "description": "Full-text search over local Claude Code session transcripts, scoped to an agent's workdir.", "body": "# Responsibility\nPowers `/find <text>` \u2014 searching past conversations so you can resume one.\n\n# Key behaviors\n- Searches `~/.claude/projects` by workdir.\n- Newest-first; one hit per session, max 8 results.\n\n# Collaborators\nUses the Claude SDK; invoked via [handlers](/components/handlers.md)."}, {"id": "components/ops/watchers", "label": "watchers.py \u2014 passive change watchers", "type": "Module", "description": "Polls files/dirs/git repos with cheap fingerprints and feeds the agent proactive turns on change.", "body": "# Responsibility\nPassive monitoring. Detects changes cheaply and lets the agent react.\n\n# Key behaviors\n- Cheap fingerprints: mtime/size, dir hash, git HEAD.\n- Never reads file contents.\n\n# Collaborators\nDriven by [manager](/components/manager.md); pairs with [proactive](/components/personality/proactive.md) turns."}, {"id": "components/personality/dream", "label": "dream.py \u2014 overnight brief", "type": "Module", "description": "Builds a morning brief (yesterday's recap + today's agenda) by reusing the digest and scheduled jobs.", "body": "# Responsibility\nThe overnight pass: a morning brief combining a recap and an agenda. Pure\nbuilders (no I/O).\n\n# Key behaviors\n- Reuses [digest](/components/ops/digest.md) for yesterday's summary.\n- Builds the agenda from the [scheduler](/components/scheduler.md)'s jobs.\n\n# Collaborators\n[digest](/components/ops/digest.md) \u00b7 [scheduler](/components/scheduler.md)"}, {"id": "components/personality/mood", "label": "mood.py \u2014 transient mood", "type": "Module", "description": "A lightweight transient mood (recovering/cautious/weary/in-the-zone/neutral) layered on the stable soul.", "body": "# Responsibility\nCheap, transient affect on top of the [soul](/components/personality/soul.md),\ninjected per-turn only when it changes.\n\n# Key behaviors\n- States: recovering, cautious, weary, in-the-zone, neutral.\n- Driven by cheap signals: turn count, error/win streaks, crash recovery.\n\n# Collaborators\n[soul](/components/personality/soul.md) \u00b7 [session](/components/session.md)"}, {"id": "components/personality/proactive", "label": "proactive.py \u2014 idle check-ins", "type": "Module", "description": "Autonomous \"speak up only if there's a genuine open loop\" turns, gated by quiet hours and turn budget.", "body": "# Responsibility\nLets an agent initiate a turn when idle \u2014 but only when it finds a real open\nloop, and never as noise.\n\n# Key behaviors\n- Respects quiet hours and the non-human turn budget.\n- At most one check-in per idle stretch.\n\n# Collaborators\nPure logic; driven by the [manager](/components/manager.md). Sibling of the\novernight [dream](/components/personality/dream.md) brief."}, {"id": "components/personality/soul", "label": "soul.py \u2014 character sheet", "type": "Module", "description": "Structured persona (name, emoji, role, tone, values, quirks) injected into every turn's system prompt.", "body": "# Responsibility\nThe stable character of an agent. Renders a system-prompt block injected into\nevery turn, and a human-readable card.\n\n# Key behaviors\n- Fields: display name, emoji, role, tone, values, quirks.\n- Backward compatible: migrates an old free-text persona.\n\n# Collaborators\nLayered under transient [mood](/components/personality/mood.md); consumed by [session](/components/session.md)."}, {"id": "operations/commands", "label": "Bridge commands", "type": "Reference", "description": "The slash commands the bridge itself handles; everything else passes through to Claude.", "body": "Handled by [handlers.py](/components/handlers.md). Everything else (including\nunknown `/slashcommands` like `/clear`, `/compact`, `/review`) goes straight to Claude.\n\n# Lifecycle\n`/start` `/panel` `/status` `/restart` `/interrupt` `/kill`\n\n# Agents\n`/agents` `/newagent` `/delagent` `/bind`\n\n# Modes (per agent)\n`/auto on|off` (approvals) \u00b7 `/secretary on|off` \u00b7 `/tts on|off` \u00b7 `/cwd <path>`\n\n# Secretary & scheduler ([scheduler](/components/scheduler.md))\n`/jobs` \u00b7 `/remind <when>|<text>`\n\n# Conversation\n`/sessions` `/fork` `/find <text>` ([transcripts](/components/ops/transcripts.md))\n\n# Diagnostics\n`/audit` (from `state/audit.jsonl`) \u00b7 `/logs` (recent warnings/errors)\n\n> Note: bridge `/status` and `/agents` shadow Claude's same-named commands \u2014 use\n> the \ud83d\udccb Commands picker for Claude's.\n\n# Citations\n[1] [Project README \u2014 Bridge commands](/references/readme.md)"}, {"id": "operations/config-reference", "label": "Config reference (.env / environment)", "type": "Reference", "description": "The BRIDGE_* and related environment variables, their defaults, and what they control.", "body": "Resolved by [config.py](/components/config.md). Place in `.env` next to `bridge.py`,\nor the environment.\n\n# Required\n| var | notes |\n|-----|-------|\n| `BRIDGE_BOT_TOKEN` | required (or keyring `telegram-claude-bridge/bot_token`) |\n| `BRIDGE_CHAT_ID` | your private chat |\n\n# Routing & model\n| var | default | |\n|-----|---------|-|\n| `BRIDGE_GROUP_ID` | off | forum supergroup for threaded mode |\n| `BRIDGE_WORKDIR` | `D:\\Projects` | default agent cwd |\n| `BRIDGE_MODEL` | default | `opus`/`sonnet`/`haiku`/full id |\n| `BRIDGE_CLAUDE_BIN` | auto | path to claude CLI if not on PATH |\n\n# Voice\n| var | default | |\n|-----|---------|-|\n| `OPENAI_API_KEY` / `GROQ_API_KEY` | off | transcription + OpenAI TTS (OpenAI first, Groq fallback) |\n| `BRIDGE_TTS_VOICE` / `BRIDGE_TTS_EDGE_VOICE` | `alloy` / `en-US-AriaNeural` | TTS voices |\n\n# Peer bus ([peers](/components/peers.md))\n| var | default | |\n|-----|---------|-|\n| `BRIDGE_PEER_PORT` / `_TOKEN` / `_PEERS` / `_NAME` | off | bot-to-bot bus; `PEERS` like `alice=http://host:9001;bob=\u2026` |\n| `BRIDGE_PEER_BIND` | `127.0.0.1` | listen address; set `0.0.0.0` deliberately |\n| `BRIDGE_LOCK_PORT` | `49517` | single-instance guard port |\n\n# Safety & ops\n| var | default | |\n|-----|---------|-|\n| `BRIDGE_DANGER_PATTERNS` | \u2014 | extra [guard](/components/guards.md) regexes, `;`-separated |\n| `BRIDGE_SHOW_DIFFS` | `1` | inline diff previews |\n| `BRIDGE_HEALTH_TIME` | `09:00` | daily health report + state backup (\"\" disables) |\n| `BRIDGE_MONTHLY_BUDGET_USD` | off | budget alerts at 50/80/100% |\n| `BRIDGE_CONTEXT_WARN_PCT` | `70` | context gauge warning |\n| `BRIDGE_TURN_WARN_SECONDS` | `600` | long-turn watchdog |\n| rate limits | see [rate limits](/operations/rate-limits.md) | `BRIDGE_MAX_HOPS`, \u2026 |\n\n# Citations\n[1] [Project README \u2014 Config](/references/readme.md)"}, {"id": "operations/rate-limits", "label": "Rate limits (loop prevention)", "type": "Reference", "description": "The on-by-default guards against bot-to-bot loops and runaway turns, with their env overrides.", "body": "Enforced via [ratelimit.py](/components/ratelimit.md) primitives. Dropped messages\nare announced (`\ud83d\udea6 \u2026dropped: hop limit/rate limit`), never silent.\n\n| guard | default | env |\n|-------|---------|-----|\n| bot\u2192bot hop depth | 4 | `BRIDGE_MAX_HOPS` |\n| msgs per (src,dst) agent pair | 10 / 5 min | `BRIDGE_PAIR_MSGS_PER_5MIN` |\n| non-human turns per agent | 30 / hour | `BRIDGE_BOT_TURNS_PER_HOUR` |\n| recurring job floor | 15 min | `BRIDGE_MIN_RECUR_MINUTES` |\n| max scheduled jobs | 50 | `BRIDGE_MAX_JOBS` |\n| crash restarts | exp. backoff, fresh session after 3 fast crashes | \u2014 |\n| Telegram sends | \u22651.05 s apart per chat, draft edits \u22651.5 s | \u2014 |\n| long-turn watchdog | warn at 10 min | `BRIDGE_TURN_WARN_SECONDS` |\n\n# Citations\n[1] [Project README \u2014 Rate limits](/references/readme.md)"}, {"id": "operations/runbook", "label": "Operations runbook", "type": "Runbook", "description": "Failure recovery \u2014 phantom duplicates, getUpdates conflicts, corrupted state, leaked token, full disk, deploying changes.", "body": "# Phantom \"duplicate\" processes (read first)\nA single healthy bridge is **four** python processes \u2014 see\n[the process model](/architecture/process-model.md). Don't count `bridge.py`\ninstances; don't kill \"the one whose parent isn't supervisor.py.\" Force a clean\nrestart with `restart_bridge.ps1`.\n\n# `Conflict: terminated by other getUpdates`\nTwo independent launchers poll the same token. The\n[single-instance lock](/architecture/process-model.md) makes the loser refuse to\nstart, so the real symptom is a [supervisor](/components/ops/supervisor.md)\ncrash-looping with \"another instance is already running.\" Find the second\nlauncher (Startup folder, `schtasks`, Run keys, pm2) and remove it.\n\n# State file corrupted (agents.json, jobs.json, \u2026)\nStop the bridge, restore the file from the newest `state/backup/state-*.zip`, restart.\n\n# Bot token leaked\n@BotFather \u2192 `/revoke` immediately (the token is a remote shell on this machine),\nput the new token in `.env`, restart.\n\n# C: drive full\nWindows + Claude transcripts degrade even though the bridge survives (startup/health\nreports warn below 2GB). Free space; a reboot may be needed to un-wedge WMI/PowerShell.\n\n# Bridge won't start / crash loops\n`bridge.log` has supervisor lines (`rc=\u2026`, fast-exit count, backoff); `/logs` and\n`state/bridge-app.log` have app errors. Deleting the agent's entry in\n`state/sessions.json` forces a fresh (non-resumed) session.\n\n# Deploying changes\nKilling `python` is enough for [tgbridge](/components/main.md) edits (the\nsupervisor relaunches). If `start_bridge.bat` or\n[supervisor.py](/components/ops/supervisor.md) changed, kill the whole chain and\nrelaunch `start_bridge.vbs` \u2014 never edit a `.bat` while cmd is running it.\n\n# Citations\n[1] [Project README \u2014 Runbook](/references/readme.md)"}, {"id": "references/claude-agent-sdk", "label": "Claude Agent SDK", "type": "Reference", "description": "The official SDK (claude-agent-sdk) that v2 uses to drive long-lived Claude sessions.", "body": "v2 replaced the raw `claude -p` subprocess with the official **Claude Agent SDK**\n(`claude-agent-sdk`). It provides the long-lived client wrapped by\n[session.py](/components/session.md): in-band `interrupt()`, streaming output,\nPreToolUse/PostToolUse hooks (used by [guards](/components/guards.md)), in-process\nMCP servers (used by [bridgetools](/components/bridgetools.md)), file checkpoint/\nrewind (Undo), and per-tool permission callbacks rendered as Telegram buttons.\n\n# Citations\n[1] https://docs.claude.com/en/api/agent-sdk"}, {"id": "references/readme", "label": "Project README (source of truth)", "type": "Reference", "description": "The repository README that this bundle was distilled from.", "body": "This bundle was authored from the project README, the authoritative human-written\noverview of Alfred v2 (Agent SDK). It documents layout, v1\u2192v2 changes, modes,\nrate limits, commands, run/autostart, config, the runbook, and security notes.\n\nSee the [architecture overview](/architecture/overview.md) for the distilled\nversion, and `D:\\Projects\\telegram-claude-bridge\\README.md` for the original.\n\n# Citations\n[1] D:\\Projects\\telegram-claude-bridge\\README.md"}, {"id": "references/telegram-bot-api", "label": "Telegram Bot API", "type": "Reference", "description": "The Telegram Bot API and python-telegram-bot library underlying the bridge's I/O.", "body": "The bridge's transport. [handlers](/components/handlers.md) consume updates and\n[outbox](/components/outbox.md) sends replies, both via python-telegram-bot.\nRelevant primitives: forum topics (threaded mode), inline keyboards (approvals,\nquick replies), `set_my_commands` (the command menu), message editing (live\nstreaming drafts), media groups (photo albums), and the per-chat send rate limits.\n\n# Citations\n[1] https://core.telegram.org/bots/api"}], "edges": [{"source": "architecture/overview", "target": "components/ops/supervisor"}, {"source": "architecture/overview", "target": "components/main"}, {"source": "architecture/overview", "target": "architecture/process-model"}, {"source": "architecture/overview", "target": "components/main"}, {"source": "architecture/overview", "target": "components/manager"}, {"source": "architecture/overview", "target": "components/scheduler"}, {"source": "architecture/overview", "target": "components/peers"}, {"source": "architecture/overview", "target": "components/manager"}, {"source": "architecture/overview", "target": "components/session"}, {"source": "architecture/overview", "target": "components/session"}, {"source": "architecture/overview", "target": "components/guards"}, {"source": "architecture/overview", "target": "components/personality/soul"}, {"source": "architecture/overview", "target": "components/ratelimit"}, {"source": "architecture/overview", "target": "components/handlers"}, {"source": "architecture/overview", "target": "components/outbox"}, {"source": "architecture/overview", "target": "components/fmt"}, {"source": "architecture/overview", "target": "components/voice"}, {"source": "architecture/overview", "target": "components/bridgetools"}, {"source": "architecture/overview", "target": "components/markers"}, {"source": "architecture/overview", "target": "references/readme"}, {"source": "architecture/overview", "target": "references/claude-agent-sdk"}, {"source": "architecture/process-model", "target": "components/ops/supervisor"}, {"source": "architecture/process-model", "target": "components/main"}, {"source": "architecture/process-model", "target": "components/ops/supervisor"}, {"source": "architecture/process-model", "target": "o r"}, {"source": "components/manager", "target": "components/session"}, {"source": "components/manager", "target": "components/scheduler"}, {"source": "components/manager", "target": "components/ops/escalate"}, {"source": "components/manager", "target": "components/personality/proactive"}, {"source": "components/manager", "target": "components/ops/digest"}, {"source": "components/manager", "target": "components/session"}, {"source": "components/manager", "target": "components/memory"}, {"source": "components/manager", "target": "components/mini-apps/todos"}, {"source": "components/manager", "target": "components/mini-apps/expenses"}, {"source": "components/manager", "target": "components/mini-apps/contacts"}, {"source": "components/manager", "target": "components/scheduler"}, {"source": "components/manager", "target": "components/peers"}, {"source": "components/manager", "target": "components/ops/watchers"}, {"source": "components/manager", "target": "components/ops/digest"}, {"source": "components/manager", "target": "components/ops/escalate"}, {"source": "components/manager", "target": "components/personality/proactive"}, {"source": "components/markers", "target": "components/bridgetools"}, {"source": "components/markers", "target": "components/scheduler"}, {"source": "components/markers", "target": "components/session"}, {"source": "components/markers", "target": "components/scheduler"}, {"source": "components/memory", "target": "components/session"}, {"source": "components/memory", "target": "components/bridgetools"}, {"source": "components/memory", "target": "components/manager"}, {"source": "components/memory", "target": "components/mini-apps/contacts"}, {"source": "components/outbox", "target": "components/fmt"}, {"source": "components/outbox", "target": "components/fmt"}, {"source": "components/peers", "target": "components/ratelimit"}, {"source": "components/peers", "target": "components/config"}, {"source": "components/peers", "target": "components/ratelimit"}, {"source": "components/ratelimit", "target": "operations/rate-limits"}, {"source": "components/ratelimit", "target": "components/peers"}, {"source": "components/ratelimit", "target": "components/session"}, {"source": "components/ratelimit", "target": "components/scheduler"}, {"source": "components/scheduler", "target": "components/config"}, {"source": "components/scheduler", "target": "components/markers"}, {"source": "components/scheduler", "target": "components/session"}, {"source": "components/scheduler", "target": "components/ops/metrics"}, {"source": "components/session", "target": "components/ratelimit"}, {"source": "components/session", "target": "components/guards"}, {"source": "components/session", "target": "components/personality/soul"}, {"source": "components/session", "target": "components/personality/mood"}, {"source": "components/session", "target": "components/bridgetools"}, {"source": "components/session", "target": "components/bridgetools"}, {"source": "components/session", "target": "components/guards"}, {"source": "components/session", "target": "components/markers"}, {"source": "components/session", "target": "components/voice"}, {"source": "components/session", "target": "components/outbox"}, {"source": "components/session", "target": "components/personality/soul"}, {"source": "components/session", "target": "components/personality/mood"}, {"source": "components/session", "target": "components/ratelimit"}, {"source": "components/voice", "target": "components/config"}, {"source": "components/voice", "target": "components/handlers"}, {"source": "components/voice", "target": "components/session"}, {"source": "components/mini-apps/contacts", "target": "components/memory"}, {"source": "components/mini-apps/contacts", "target": "components/manager"}, {"source": "components/mini-apps/contacts", "target": "components/memory"}, {"source": "components/mini-apps/expenses", "target": "components/manager"}, {"source": "components/mini-apps/expenses", "target": "components/mini-apps/todos"}, {"source": "components/mini-apps/expenses", "target": "components/mini-apps/contacts"}, {"source": "components/mini-apps/todos", "target": "components/manager"}, {"source": "components/mini-apps/todos", "target": "components/manager"}, {"source": "components/mini-apps/todos", "target": "components/mini-apps/expenses"}, {"source": "components/mini-apps/todos", "target": "components/mini-apps/contacts"}, {"source": "components/ops/digest", "target": "components/config"}, {"source": "components/ops/digest", "target": "components/personality/dream"}, {"source": "components/ops/escalate", "target": "components/manager"}, {"source": "components/ops/metrics", "target": "components/guards"}, {"source": "components/ops/metrics", "target": "components/scheduler"}, {"source": "components/ops/metrics", "target": "components/handlers"}, {"source": "components/ops/metrics", "target": "components/ops/digest"}, {"source": "components/ops/supervisor", "target": "components/main"}, {"source": "components/ops/supervisor", "target": "architecture/process-model"}, {"source": "components/ops/supervisor", "target": "components/main"}, {"source": "components/ops/transcripts", "target": "components/handlers"}, {"source": "components/ops/watchers", "target": "components/manager"}, {"source": "components/ops/watchers", "target": "components/personality/proactive"}, {"source": "components/personality/dream", "target": "components/ops/digest"}, {"source": "components/personality/dream", "target": "components/scheduler"}, {"source": "components/personality/dream", "target": "components/ops/digest"}, {"source": "components/personality/dream", "target": "components/scheduler"}, {"source": "components/personality/mood", "target": "components/personality/soul"}, {"source": "components/personality/mood", "target": "components/personality/soul"}, {"source": "components/personality/mood", "target": "components/session"}, {"source": "components/personality/proactive", "target": "components/manager"}, {"source": "components/personality/proactive", "target": "components/personality/dream"}, {"source": "components/personality/soul", "target": "components/personality/mood"}, {"source": "components/personality/soul", "target": "components/session"}, {"source": "operations/commands", "target": "components/handlers"}, {"source": "operations/commands", "target": "components/scheduler"}, {"source": "operations/commands", "target": "components/ops/transcripts"}, {"source": "operations/commands", "target": "references/readme"}, {"source": "operations/config-reference", "target": "components/config"}, {"source": "operations/config-reference", "target": "components/peers"}, {"source": "operations/config-reference", "target": "components/guards"}, {"source": "operations/config-reference", "target": "operations/rate-limits"}, {"source": "operations/config-reference", "target": "references/readme"}, {"source": "operations/rate-limits", "target": "components/ratelimit"}, {"source": "operations/rate-limits", "target": "references/readme"}, {"source": "operations/runbook", "target": "architecture/process-model"}, {"source": "operations/runbook", "target": "architecture/process-model"}, {"source": "operations/runbook", "target": "components/ops/supervisor"}, {"source": "operations/runbook", "target": "components/main"}, {"source": "operations/runbook", "target": "components/ops/supervisor"}, {"source": "operations/runbook", "target": "references/readme"}, {"source": "references/claude-agent-sdk", "target": "components/session"}, {"source": "references/claude-agent-sdk", "target": "components/guards"}, {"source": "references/claude-agent-sdk", "target": "components/bridgetools"}, {"source": "references/readme", "target": "architecture/overview"}, {"source": "references/telegram-bot-api", "target": "components/handlers"}, {"source": "references/telegram-bot-api", "target": "components/outbox"}]};
const types=[...new Set(DATA.nodes.map(n=>n.type))].sort();
const palette=["#6ea8fe","#7ee787","#f0883e","#d2a8ff","#ff7b72","#ffd866","#79c0ff","#56d364"];
const color={}; types.forEach((t,i)=>color[t]=palette[i%palette.length]);
const ft=document.getElementById('ft'); types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;ft.appendChild(o)});
const byId=Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
const els=[...DATA.nodes.map(n=>({data:{id:n.id,label:n.label,type:n.type}})),
 ...DATA.edges.map((e,i)=>({data:{id:'e'+i,source:e.source,target:e.target}}))];
const cy=cytoscape({container:document.getElementById('cy'),elements:els,
 style:[{selector:'node',style:{'background-color':e=>color[e.data('type')]||'#888','label':'data(label)','font-size':9,'color':'#cdd6e0','text-wrap':'wrap','text-max-width':90,'width':18,'height':18}},
  {selector:'edge',style:{'width':1,'line-color':'#39424f','target-arrow-color':'#39424f','target-arrow-shape':'triangle','curve-style':'bezier','arrow-scale':.8}},
  {selector:'.dim',style:{'opacity':.12}},{selector:'.sel',style:{'border-width':3,'border-color':'#fff'}}],
 layout:{name:'cose',animate:false}});
document.getElementById('stat').textContent=DATA.nodes.length+' concepts · '+DATA.edges.length+' links';
function backlinks(id){return DATA.edges.filter(e=>e.target===id).map(e=>e.source)}
function show(id){const n=byId[id];if(!n)return;cy.nodes().removeClass('sel');cy.getElementById(id).addClass('sel');
 const bl=backlinks(id);
 let h='<span class="t">'+n.type+'</span><h2>'+n.label+'</h2><div class="d">'+(n.description||'')+'</div>';
 h+=marked.parse(n.body||'');
 if(bl.length){h+='<hr><b>Cited by</b><ul>'+bl.map(b=>'<li><a data-go="'+b+'">'+(byId[b]?byId[b].label:b)+'</a></li>').join('')+'</ul>'}
 const p=document.getElementById('panel');p.innerHTML=h;
 p.querySelectorAll('a[href$=".md"]').forEach(a=>{a.dataset.go=a.getAttribute('href').replace(/^\//,'').replace(/\.md$/,'');a.removeAttribute('href')});
 p.querySelectorAll('a[data-go]').forEach(a=>a.onclick=()=>show(a.dataset.go));}
cy.on('tap','node',e=>show(e.target.id()));
document.getElementById('q').oninput=e=>{const v=e.target.value.toLowerCase();
 cy.nodes().forEach(n=>{const d=byId[n.id()];const hit=!v||(d.label+d.id+d.type).toLowerCase().includes(v);n.toggleClass('dim',!hit)})};
ft.onchange=e=>{const v=e.target.value;cy.nodes().forEach(n=>n.toggleClass('dim',v&&n.data('type')!==v))};
document.getElementById('lay').onchange=e=>cy.layout({name:e.target.value,animate:false}).run();
</script></body></html>
