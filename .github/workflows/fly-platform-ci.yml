name: Alfred Fly Platform CI

on:
  pull_request:
    paths:
      - "cloud/**"
      - "tests/**"
      - "Dockerfile.fly"
      - "fly.toml"
      - ".github/workflows/fly-platform-ci.yml"
  push:
    branches: [master]
    paths:
      - "cloud/**"
      - "tests/**"
      - "Dockerfile.fly"
      - "fly.toml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements.txt pytest
      - name: Run platform tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          ALFRED_ALLOWED_REPOS: ""
        run: python -m pytest -q tests/test_cloud_platform.py
      - run: python -m compileall -q cloud

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Quiet checkout
        shell: bash
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD
      - name: Build Fly image
        shell: bash
        run: |
          set +e
          docker build --progress=plain -f Dockerfile.fly -t alfred-fly:test . > /tmp/docker-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- matched errors ---"
            grep -Ei '(^|[^a-z])(error|failed|failure|not found|exit code|npm err|traceback)([^a-z]|$)' /tmp/docker-build.log | tail -n 35 || true
            echo "--- build tail ---"
            tail -n 35 /tmp/docker-build.log
          else
            tail -n 12 /tmp/docker-build.log
          fi
          exit $status
